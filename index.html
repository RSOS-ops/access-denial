<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Access Denied</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    /* Full-screen video, no native controls, no interaction */
    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      pointer-events: none; /* user cannot pause / scrub / restart */
    }

    /* ---- Mute / unmute toggle (bottom-right) ---- */
    #muteBtn {
      position: fixed;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      cursor: pointer;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.4s ease, background 0.2s ease, transform 0.1s ease;
      z-index: 2;
    }

    #muteBtn:hover,
    #muteBtn:focus-visible {
      background: rgba(0, 0, 0, 0.7);
      outline: none;
    }

    #muteBtn:active {
      transform: scale(0.92);
    }

    #muteBtn .icon {
      width: 26px;
      height: 26px;
      display: none;
    }

    #muteBtn.is-muted .icon-muted {
      display: block;
    }

    #muteBtn:not(.is-muted) .icon-unmuted {
      display: block;
    }

    /* Hidden once the video has ended (no audio left to toggle). */
    #muteBtn.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ---- "Tap or Click" hint (top-center) ---- */
    #tapHint {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.7);
      pointer-events: none;
      user-select: none;
      z-index: 2;
      white-space: nowrap;
    }

    /* ---- "Go Back" button — hidden until 3s after the video ends ---- */
    #goBack {
      position: fixed;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      padding: 16px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-radius: 8px;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      z-index: 2;
    }

    #goBack.show {
      visibility: visible;
      opacity: 1;
    }

    #goBack:hover,
    #goBack:focus-visible {
      background: rgba(255, 255, 255, 0.95);
      color: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <video
    id="video"
    autoplay
    muted
    playsinline
    webkit-playsinline
    preload="auto"
    disablepictureinpicture
    disableremoteplayback
    x5-playsinline
    oncontextmenu="return false"
  ></video>

  <div id="tapHint">Tap or Click</div>

  <button id="muteBtn" class="is-muted" type="button" aria-label="Unmute" aria-pressed="true">
    <!-- Muted: speaker with an X -->
    <svg class="icon icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none" />
      <line x1="16" y1="9" x2="22" y2="15" />
      <line x1="22" y1="9" x2="16" y2="15" />
    </svg>
    <!-- Unmuted: speaker with sound waves -->
    <svg class="icon icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none" />
      <path d="M15.5 8.5a5 5 0 0 1 0 7" />
      <path d="M18.5 5.5a9 9 0 0 1 0 13" />
    </svg>
  </button>

  <button id="goBack" type="button">Go Back</button>

  <script>
    (function () {
      "use strict";

      var video = document.getElementById("video");
      var muteBtn = document.getElementById("muteBtn");
      var goBackBtn = document.getElementById("goBack");
      var tapHint = document.getElementById("tapHint");

      var LANDSCAPE_SRC = "media/access-denied-landscape-1.mp4";
      var PORTRAIT_SRC = "media/access-denied-portrait-1.mp4";

      /* ---- Choose the correct video file ---- */
      function isMobileDevice() {
        var ua = navigator.userAgent || "";
        var uaMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
        // iPadOS reports as desktop Safari, so also treat coarse-pointer + touch as mobile.
        var touchCoarse =
          (navigator.maxTouchPoints || 0) > 1 &&
          window.matchMedia &&
          window.matchMedia("(pointer: coarse)").matches;
        return uaMobile || touchCoarse;
      }

      function isPortrait() {
        if (window.matchMedia) {
          return window.matchMedia("(orientation: portrait)").matches;
        }
        return window.innerHeight >= window.innerWidth;
      }

      // Portrait file only for mobile devices held upright; everything else is landscape.
      var src = isMobileDevice() && isPortrait() ? PORTRAIT_SRC : LANDSCAPE_SRC;
      video.src = src;

      /* ---- Playback: autoplay, muted (so it ALWAYS starts) ---- */
      video.muted = true;
      video.loop = false;
      video.controls = false;

      function startPlayback() {
        var attempt = video.play();
        if (attempt && typeof attempt.then === "function") {
          attempt.catch(function () {
            // Muted playback should never be blocked; retry once on next tick.
            setTimeout(function () {
              video.play().catch(function () {});
            }, 150);
          });
        }
      }

      if (video.readyState >= 2) {
        startPlayback();
      } else {
        video.addEventListener("loadeddata", startPlayback, { once: true });
      }
      // Safety net in case loadeddata is slow/missed.
      window.addEventListener("load", startPlayback, { once: true });

      /* ---- Shared mute-state helper ---- */
      function setMuted(muted) {
        video.muted = muted;
        if (!muted) video.volume = 1.0;
        muteBtn.classList.toggle("is-muted", muted);
        muteBtn.setAttribute("aria-pressed", String(muted));
        muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
      }

      /* ---- Tap / click anywhere to unmute (fires once) ---- */
      function onFirstInteraction(e) {
        // Let the mute button handle its own clicks separately.
        if (e.target.closest && e.target.closest("#muteBtn")) return;
        setMuted(false);
        tapHint.style.display = "none";
        removeTapToUnmute();
      }

      function removeTapToUnmute() {
        document.removeEventListener("click", onFirstInteraction, true);
        document.removeEventListener("touchstart", onFirstInteraction, true);
      }

      document.addEventListener("click", onFirstInteraction, true);
      document.addEventListener("touchstart", onFirstInteraction, true);

      /* ---- Mute button toggle ---- */
      muteBtn.addEventListener("click", function () {
        // Once the user consciously controls the button, retire the tap-anywhere shortcut.
        removeTapToUnmute();
        setMuted(!video.muted);
      });

      /* ---- Prevent restart / repeat ---- */
      var hasEnded = false;
      video.addEventListener("seeking", function () {
        if (hasEnded && video.duration && isFinite(video.duration)) {
          video.currentTime = video.duration; // snap back to final frame
        }
      });

      /* ---- End of playback: freeze, hide mute, wait 3s, reveal button ---- */
      video.addEventListener("ended", function () {
        hasEnded = true;
        video.pause();
        removeTapToUnmute();
        tapHint.style.display = "none";
        muteBtn.classList.add("hidden"); // nothing left to toggle once frozen

        setTimeout(function () {
          goBackBtn.classList.add("show");
        }, 3000);
      });

      /* ---- Go Back: return to the previous page ---- */
      goBackBtn.addEventListener("click", function () {
        if (window.history.length > 1) {
          window.history.back();
        } else if (document.referrer) {
          window.location.href = document.referrer;
        } else {
          window.close(); // last resort if opened directly with no history
        }
      });
    })();
  </script>
</body>
</html>
