<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Access Denied</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      pointer-events: none;
    }

    /* Sits above the video, below the buttons. Intercepts all touches so
       the video element never receives them — critical for preventing iOS
       Safari from pausing on tap via its native gesture recognizer. */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---- "Tap or Click" hint (top-center) ---- */
    #tapHint {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.7);
      pointer-events: none;
      user-select: none;
      z-index: 3;
      white-space: nowrap;
    }

    /* ---- Mute / unmute toggle (bottom-right) ---- */
    #muteBtn {
      position: fixed;
      right: max(20px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      border: 1.5px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      cursor: pointer;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.4s ease, background 0.2s ease, transform 0.1s ease;
      z-index: 3;
    }

    #muteBtn:hover,
    #muteBtn:focus-visible {
      background: rgba(0, 0, 0, 0.7);
      outline: none;
    }

    #muteBtn:active {
      transform: scale(0.92);
    }

    #muteBtn .icon {
      width: 26px;
      height: 26px;
      display: none;
    }

    #muteBtn.is-muted .icon-muted   { display: block; }
    #muteBtn:not(.is-muted) .icon-unmuted { display: block; }

    #muteBtn.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ---- "Go Back" button ---- */
    #goBack {
      position: fixed;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      padding: 16px 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-radius: 8px;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      z-index: 3;
    }

    #goBack.show {
      visibility: visible;
      opacity: 1;
    }

    #goBack:hover,
    #goBack:focus-visible {
      background: rgba(255, 255, 255, 0.95);
      color: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <video
    id="video"
    autoplay
    muted
    playsinline
    webkit-playsinline
    preload="auto"
    disablepictureinpicture
    disableremoteplayback
    x5-playsinline
    oncontextmenu="return false"
  ></video>

  <!-- Intercepts all touches; z-index keeps it above the video but below buttons -->
  <div id="overlay"></div>

  <div id="tapHint">Tap or Click</div>

  <button id="muteBtn" class="is-muted" type="button" aria-label="Unmute" aria-pressed="true">
    <svg class="icon icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none" />
      <line x1="16" y1="9" x2="22" y2="15" />
      <line x1="22" y1="9" x2="16" y2="15" />
    </svg>
    <svg class="icon icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M11 5 6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none" />
      <path d="M15.5 8.5a5 5 0 0 1 0 7" />
      <path d="M18.5 5.5a9 9 0 0 1 0 13" />
    </svg>
  </button>

  <button id="goBack" type="button">Go Back</button>

  <script>
    (function () {
      "use strict";

      var video    = document.getElementById("video");
      var overlay  = document.getElementById("overlay");
      var muteBtn  = document.getElementById("muteBtn");
      var goBackBtn = document.getElementById("goBack");
      var tapHint  = document.getElementById("tapHint");

      var LANDSCAPE_SRC = "media/access-denied-landscape-1.mp4";
      var PORTRAIT_SRC  = "media/access-denied-portrait-1.mp4";

      /* ---- Device / orientation detection ---- */
      function isMobileDevice() {
        var ua = navigator.userAgent || "";
        var uaMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
        var touchCoarse =
          (navigator.maxTouchPoints || 0) > 1 &&
          window.matchMedia &&
          window.matchMedia("(pointer: coarse)").matches;
        return uaMobile || touchCoarse;
      }

      function isPortrait() {
        return window.matchMedia
          ? window.matchMedia("(orientation: portrait)").matches
          : window.innerHeight >= window.innerWidth;
      }

      video.src = isMobileDevice() && isPortrait() ? PORTRAIT_SRC : LANDSCAPE_SRC;

      /* ---- Autoplay, muted ---- */
      video.muted = true;
      video.loop = false;
      video.controls = false;

      function startPlayback() {
        var p = video.play();
        if (p && p.catch) {
          p.catch(function () {
            setTimeout(function () { video.play().catch(function () {}); }, 150);
          });
        }
      }

      if (video.readyState >= 2) { startPlayback(); }
      else { video.addEventListener("loadeddata", startPlayback, { once: true }); }
      window.addEventListener("load", startPlayback, { once: true });

      /* ---- Mute state ---- */
      function setMuted(muted) {
        video.muted = muted;
        if (!muted) video.volume = 1.0;
        muteBtn.classList.toggle("is-muted", muted);
        muteBtn.setAttribute("aria-pressed", String(muted));
        muteBtn.setAttribute("aria-label", muted ? "Unmute" : "Mute");
      }

      /* ---- One-shot unmute ---- */
      var unmuted = false;
      function doUnmute() {
        if (unmuted || hasEnded) return;
        unmuted = true;
        setMuted(false);
        tapHint.style.display = "none";
        document.removeEventListener("click", onDesktopClick, true);
      }

      /* ---- Desktop: click anywhere to unmute ---- */
      function onDesktopClick(e) {
        if (e.target.closest && e.target.closest("#muteBtn")) return;
        doUnmute();
      }
      document.addEventListener("click", onDesktopClick, true);

      /* ---- Mobile: overlay touchstart ----
         passive:false + preventDefault() cancels iOS Safari's native
         media gesture BEFORE it reaches the video engine, so the video
         cannot be paused by tap. This is the primary mobile fix. ---- */
      overlay.addEventListener("touchstart", function (e) {
        e.preventDefault();   // <-- kills the native iOS tap-to-pause gesture
        doUnmute();
        // Belt-and-suspenders: if the native engine still sneaks a pause through,
        // resume immediately on the next tick (still inside the user-gesture window).
        if (!hasEnded && video.paused) {
          video.play().catch(function () {});
        }
      }, { passive: false });

      /* ---- Mute button ---- */
      muteBtn.addEventListener("click", function () {
        document.removeEventListener("click", onDesktopClick, true);
        unmuted = true;
        setMuted(!video.muted);
      });

      /* ---- Last-resort: resume if anything external pauses the video ---- */
      var hasEnded = false;
      video.addEventListener("pause", function () {
        if (!hasEnded) {
          setTimeout(function () { video.play().catch(function () {}); }, 0);
        }
      });

      /* ---- Prevent seek-back ---- */
      video.addEventListener("seeking", function () {
        if (hasEnded && video.duration && isFinite(video.duration)) {
          video.currentTime = video.duration;
        }
      });

      /* ---- End of playback ---- */
      video.addEventListener("ended", function () {
        hasEnded = true;
        video.pause();
        document.removeEventListener("click", onDesktopClick, true);
        tapHint.style.display = "none";
        muteBtn.classList.add("hidden");
        setTimeout(function () { goBackBtn.classList.add("show"); }, 3000);
      });

      /* ---- Go Back ---- */
      goBackBtn.addEventListener("click", function () {
        if (window.history.length > 1) { window.history.back(); }
        else if (document.referrer)     { window.location.href = document.referrer; }
        else                            { window.close(); }
      });
    })();
  </script>
</body>
</html>
